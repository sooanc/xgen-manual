# Xgen GS인증 매뉴얼 — main 브랜치(=xgen.x2bee.com) 위에 gs@plateer.com 권한으로
# 노출되는 화면만 노출하는 외부 인증용 매뉴얼.
# 인덱스 페이지 카드에는 'GS인증' 으로 표시되며, 솔루션 자체는 main 환경입니다.
#
# 이 entry는 일반 고객사가 아닙니다. customers/gs-cert/manual/ 폴더는 두지 않고,
# compose.mjs가 이 ID를 만나면 자동으로 base/ 디렉토리를 source로 사용합니다.
# 따라서 base/ 를 수정하면 다음 빌드 시 본 매뉴얼에도 즉시 반영됩니다.
#
# gs@plateer.com 권한으로 사이드바에 미노출된 view 는 customers/gs-cert/screen-truth.json
# 의 ok:false 표시를 따라 자동으로 nav 에서 제외되며, base/ 콘텐츠 자체는 손대지 않습니다.

customer:
  id: gs-cert
  name: "XGEN"
  display_title: "GS인증"
  gitlab_branch: main

product:
  name: "Xgen"
  version: "main / 2.3.0"
  domain: "xgen.x2bee.com"

manual:
  version: "2.3.0-rev1"
  released_at: "2026-05-29"
  channel: draft

# 빌드 환경 메타데이터 — 인트로 페이지 "빌드 출처" 표에 사용
build:
  branch: main
  environment: MAIN
  capture_url: xgen.x2bee.com
  repository: xgen2.0/xgen-frontend
  audience: gs-cert  # 외부 인증용 (gs@plateer.com 권한 범위)

vars:
  support_email: "x2bee_tech@plateer.com"

outputs:
  html:
    base_url: "/docs/gs-cert"
  docx: {}
