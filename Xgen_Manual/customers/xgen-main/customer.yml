# Xgen 표준 매뉴얼 (Main 환경 기준) — xgen-frontend main 브랜치 + xgen.x2bee.com 라이브 화면 기준.
# 표준 매뉴얼(xgen-standard)과 같은 base/ 콘텐츠를 공유하지만 main 환경에서 미배포된 view 는
# customers/xgen-main/screen-truth.json 의 ok:false 표시로 자동 nav 제외됨.
#
# compose.mjs 는 customer.id === 'xgen-main' 을 만나면 customers/xgen-main/manual/ 대신
# base/ 디렉토리를 직접 source 로 사용하고, screen-truth 는 본 폴더의 파일을 우선 로드한다.

customer:
  id: xgen-main
  name: "XGEN"
  gitlab_branch: main

product:
  name: "Xgen"
  version: "main / 2.3.0"
  domain: "xgen.x2bee.com"

manual:
  version: "2.3.0-rev1"
  released_at: "2026-05-29"
  channel: draft

# 빌드 환경 메타데이터 — 인트로 페이지 "빌드 출처" 표에 사용
build:
  branch: main
  environment: MAIN
  capture_url: xgen.x2bee.com
  repository: xgen2.0/xgen-frontend

vars:
  support_email: "x2bee_tech@plateer.com"

outputs:
  html:
    base_url: "/docs/xgen-main"
  docx: {}
