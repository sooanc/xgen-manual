# Xgen 표준 매뉴얼 (Main 환경 기준) — xgen-frontend main 브랜치를 그대로 빌드한 결과.
# 라이브 화면은 https://xgen.x2bee.com 를 기준으로 합니다.
#
# 이 entry는 일반 고객사가 아닙니다. customers/xgen-main/manual/ 폴더는 두지 않고,
# compose.mjs가 이 ID를 만나면 자동으로 base/ 디렉토리를 source로 사용합니다.
# 따라서 base/ 를 수정하면 다음 빌드 시 본 매뉴얼에도 즉시 반영됩니다.
#
# main 환경에서 미배포된 view 는 customers/xgen-main/screen-truth.json 의 ok:false
# 표시를 따라 자동으로 nav 에서 제외되며, base/ 콘텐츠 자체는 손대지 않습니다.

customer:
  id: xgen-main
  name: "XGEN"
  gitlab_branch: main

product:
  name: "Xgen"
  version: "main / 2.3.0"
  domain: "xgen.x2bee.com"

manual:
  version: "2.3.0-rev1"
  released_at: "2026-05-29"
  channel: draft

# 빌드 환경 메타데이터 — 인트로 페이지 "빌드 출처" 표에 사용
build:
  branch: main
  environment: MAIN
  capture_url: xgen.x2bee.com
  repository: xgen2.0/xgen-frontend

vars:
  support_email: "x2bee_tech@plateer.com"

outputs:
  html:
    base_url: "/docs/xgen-main"
  docx: {}
