name: Deploy to GitHub Pages

# main 브랜치 push 시:
#   1. Xgen_Manual/base/ + customers/ 를 컴포즈
#   2. MkDocs로 HTML 빌드 → Xgen_Manual/dist/site/
#   3. 표준 매뉴얼(xgen-standard)을 public/ 으로 복사 후 Pages artifact 업로드
#   4. GitHub Pages 배포
#
# 캡처는 CI에서 안 돈다 — stg 자격증명을 CI에 두지 않기 위함.
# 로컬에서 npm run capture:all 로 PNG 갱신 후 커밋.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mkdocs-git-revision-date-localized-plugin 가 full git history 필요

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (MkDocs + plugins)
        run: |
          pip install \
            mkdocs-material \
            mkdocs-macros-plugin \
            mkdocs-awesome-pages-plugin \
            mkdocs-glightbox \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-static-i18n \
            pymdown-extensions

      - name: Install Node deps
        working-directory: Xgen_Manual
        run: npm ci

      - name: Build xgen-standard (HTML)
        working-directory: Xgen_Manual
        run: node build/build.mjs --customer xgen-standard --formats html

      - name: Prepare Pages artifact
        run: |
          rm -rf public
          cp -r Xgen_Manual/dist/site/docs/xgen-standard public
          test -f public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
