name: Deploy to GitHub Pages

# main 브랜치 push 시:
#   1. Playwright 로 stg 캡처 → PNG 갱신 + screen-truth.json 머지 (require_view 동기화)
#   2. Xgen_Manual/base/ + customers/ 를 컴포즈
#   3. MkDocs로 HTML 빌드 → Xgen_Manual/dist/site/
#   4. 표준 매뉴얼(xgen-standard)을 public/ 으로 복사 후 Pages artifact 업로드
#   5. GitHub Pages 배포
#
# stg 자격증명은 GitHub Actions Secrets 에 등록:
#   - XGEN_BASE_URL       (예: https://stg-xgen.x2bee.com/)
#   - XGEN_LOGIN_EMAIL    (캡처용 계정 — 가급적 슈퍼유저)
#   - XGEN_LOGIN_PASSWORD
# Secrets 누락/캡처 실패 시 continue-on-error 로 빌드는 계속 진행되며,
# 기존 commit 된 screen-truth.json (safe default = views: {}) 가 fallback.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mkdocs-git-revision-date-localized-plugin 가 full git history 필요

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (MkDocs + plugins)
        run: |
          pip install \
            mkdocs-material \
            mkdocs-macros-plugin \
            mkdocs-awesome-pages-plugin \
            mkdocs-glightbox \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-static-i18n \
            pymdown-extensions

      - name: Install root Node deps (Playwright)
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Write .env.xgen-stg from secrets
        env:
          XGEN_BASE_URL: ${{ secrets.XGEN_BASE_URL }}
          XGEN_LOGIN_EMAIL: ${{ secrets.XGEN_LOGIN_EMAIL }}
          XGEN_LOGIN_PASSWORD: ${{ secrets.XGEN_LOGIN_PASSWORD }}
        run: |
          {
            echo "XGEN_BASE_URL=${XGEN_BASE_URL}"
            echo "XGEN_LOGIN_EMAIL=${XGEN_LOGIN_EMAIL}"
            echo "XGEN_LOGIN_PASSWORD=${XGEN_LOGIN_PASSWORD}"
          } > .env.xgen-stg

      - name: Capture stg views (updates screen-truth.json + PNGs)
        continue-on-error: true  # 캡처 실패 시 commit 된 screen-truth.json fallback
        run: npm run capture:all

      - name: Install Node deps (Xgen_Manual)
        working-directory: Xgen_Manual
        run: npm ci

      - name: Build all customers (HTML) + index
        working-directory: Xgen_Manual
        run: node build/build.mjs --customer all --formats html

      - name: Prepare Pages artifact
        run: |
          rm -rf public
          cp -r Xgen_Manual/dist/site public
          test -f public/index.html
          test -d public/docs/xgen-standard

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
